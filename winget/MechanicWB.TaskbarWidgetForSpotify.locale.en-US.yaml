ShortDescription: Now-playing widget for Spotify embedded in the Windows 11 taskbar.
Description: >-
  Shows the current Spotify track (album art, title, artist) directly inside
  the Windows 11 taskbar, with full controls: play/pause, previous/next,
  favorites with liked state, the three Spotify shuffle modes (including Smart
  Shuffle), repeat modes, Spotify volume and a seekable progress bar.
  Unofficial project, not affiliated with Spotify AB.
